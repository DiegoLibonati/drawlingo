services:
  pinturillo-api:
    build:
      context: ./pinturillo-api
      dockerfile: Dockerfile.development
    restart: always
    volumes:
      - ./pinturillo-api/src:/home/app/src
    ports:
      - "5000:5000"
    env_file:
      - ./pinturillo-api/.env
    depends_on:
      - redis
    networks:
      - pinturillo-vue-network

  pinturillo-vue:
    build:
      context: ./pinturillo-vue
      dockerfile: Dockerfile.development
    restart: always
    volumes:
      - ./pinturillo-vue:/home/app
      - /home/app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./pinturillo-vue/.env
    depends_on:
      - redis
      - pinturillo-api
    networks:
      - pinturillo-vue-network
    tty: true

  redis:
    image: redis:7
    restart: always
    volumes:
      - ./volumes/redis:/var/lib/redis
    networks:
      - pinturillo-vue-network

networks:
  pinturillo-vue-network:
