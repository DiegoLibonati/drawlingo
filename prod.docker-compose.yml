services:
  drawlingo-api:
    build:
      context: ./drawlingo-api
      dockerfile: Dockerfile.production
    container_name: drawlingo-api
    restart: always
    env_file:
      - ./drawlingo-api/.env
    expose:
      - 5050:5050
    depends_on:
      - redis
    networks:
      - drawlingo-net

  drawlingo-app:
    build:
      context: ./drawlingo-app
      dockerfile: Dockerfile.production
    container_name: drawlingo-app
    restart: always
    env_file:
      - ./drawlingo-app/.env
    ports:
      - 3000:8080
    depends_on:
      - redis
      - drawlingo-api
    networks:
      - drawlingo-net

  redis:
    image: redis:7.0
    restart: always
    volumes:
      - ./volumes/redis:/data
    networks:
      - drawlingo-net
    ports:
      - "6379:6379"

networks:
  drawlingo-net:
    name: drawlingo-net
